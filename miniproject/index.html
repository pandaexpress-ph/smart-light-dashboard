<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Light Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>⚡ Smart Light Dashboard</h1>

<div id="connectionStatus" class="badge">● Connecting...</div>

<div class="grid">

  <!-- ADC -->
  <div class="card">
    <h2>ADC</h2>
    <div id="adcValue">0%</div>
    <div id="adcStatus">WAITING</div>

    <div class="bar">
      <div id="progressBar"></div>
    </div>
  </div>

  <!-- PWM -->
  <div class="card">
    <h2>PWM Output</h2>
    <div id="pwmDisplay">0%</div>
  </div>

  <!-- LIGHT -->
  <div class="card">
    <h2>Light</h2>
    <div id="lightBulb" class="light-off"></div>
  </div>

  <!-- CONTROL -->
  <div class="card">
    <h2>Control</h2>

    <button id="onBtn">ON</button>
    <button id="offBtn">OFF</button>

    <input type="range" id="brightnessSlider" min="0" max="100">
    <div><span id="brightnessValue">0</span>%</div>

    <button id="autoModeBtn">AUTO OFF</button>
  </div>

</div>

<!-- CHART -->
<div class="card chart-card">
  <canvas id="adcChart"></canvas>
</div>

<script src="main.js"></script>

</body>
</html>
